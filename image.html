<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<style>

/* Page Styling */

body{
font-family: Arial, sans-serif;
text-align:center;
background:#f4f4f4;
margin:0;
}

h1{
margin:20px;
}

/* Filter Buttons */

.filters button{
padding:10px 15px;
margin:5px;
border:none;
background:#333;
color:white;
cursor:pointer;
transition:0.3s;
}

.filters button:hover{
background:orange;
}

/* Gallery Layout */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:transform 0.4s, filter 0.4s;
}

/* Hover Effect */

.gallery img:hover{
transform:scale(1.08);
filter:brightness(80%);
}

/* Lightbox */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
}

.lightbox img{
max-width:80%;
max-height:80%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

.nav button{
padding:10px 20px;
margin:20px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Image Gallery</h1>

<!-- Filter Buttons -->

<div class="filters">
<button onclick="filterImages('all')">All</button>
<button onclick="filterImages('nature')">Nature</button>
<button onclick="filterImages('city')">City</button>
<button onclick="filterImages('animals')">Animals</button>
</div>

<!-- Gallery -->

<div class="gallery">

<img src="https://picsum.photos/id/1015/400/300" class="gallery-item nature">
<img src="https://picsum.photos/id/1011/400/300" class="gallery-item city">
<img src="https://picsum.photos/id/1025/400/300" class="gallery-item animals">
<img src="https://picsum.photos/id/1039/400/300" class="gallery-item nature">
<img src="https://picsum.photos/id/1043/400/300" class="gallery-item city">
<img src="https://picsum.photos/id/1074/400/300" class="gallery-item animals">

</div>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">

<span class="close">&times;</span>

<img id="lightbox-img">

<div class="nav">
<button id="prev">Prev</button>
<button id="next">Next</button>
</div>

</div>

<script>

const images=document.querySelectorAll(".gallery-item");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

const nextBtn=document.getElementById("next");
const prevBtn=document.getElementById("prev");
const closeBtn=document.querySelector(".close");

let currentIndex=0;

/* Open Lightbox */

images.forEach((img,index)=>{

img.addEventListener("click",()=>{

lightbox.style.display="flex";
lightboxImg.src=img.src;
currentIndex=index;

});

});

/* Close Lightbox */

closeBtn.onclick=()=>{
lightbox.style.display="none";
}

/* Next Button */

nextBtn.onclick=()=>{

currentIndex++;

if(currentIndex>=images.length){
currentIndex=0;
}

lightboxImg.src=images[currentIndex].src;

}

/* Previous Button */

prevBtn.onclick=()=>{

currentIndex--;

if(currentIndex<0){
currentIndex=images.length-1;
}

lightboxImg.src=images[currentIndex].src;

}

/* Image Filter */

function filterImages(category){

images.forEach(img=>{

if(category=="all"){
img.style.display="block";
}
else if(img.classList.contains(category)){
img.style.display="block";
}
else{
img.style.display="none";
}

});

}

</script>

</body>
</html>
